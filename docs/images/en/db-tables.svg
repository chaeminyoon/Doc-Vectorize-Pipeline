<text x="22" y="56" xml:space="preserve"><tspan fill="#3fb950">$ </tspan><tspan fill="#e6edf3">psql -d vectordb</tspan></text>
<text x="22" y="77" xml:space="preserve"><tspan fill="#e6edf3"></tspan></text>
<text x="22" y="98" xml:space="preserve"><tspan fill="#79c0ff">        tbl         | count |  contents</tspan></text>
<text x="22" y="119" xml:space="preserve"><tspan fill="#30363d">--------------------+-------+--------------------------------------------------</tspan></text>
<text x="22" y="140" xml:space="preserve"><tspan fill="#e6edf3"> documents          |     </tspan><tspan fill="#3fb950">3</tspan><tspan fill="#8b949e">  |  document metadata (title, dept, category, file_hash)</tspan></text>
<text x="22" y="161" xml:space="preserve"><tspan fill="#e6edf3"> document_chunks    |     </tspan><tspan fill="#3fb950">7</tspan><tspan fill="#8b949e">  |  chunks + embedding vector(1024)</tspan></text>
<text x="22" y="182" xml:space="preserve"><tspan fill="#e6edf3"> attachments        |     </tspan><tspan fill="#3fb950">3</tspan><tspan fill="#8b949e">  |  attachment list (main-body PDF identified)</tspan></text>
<text x="22" y="203" xml:space="preserve"><tspan fill="#e6edf3"> permit_extractions |     </tspan><tspan fill="#3fb950">3</tspan><tspan fill="#8b949e">  |  9 permit fields + confidence</tspan></text>
<text x="22" y="224" xml:space="preserve"><tspan fill="#e6edf3"></tspan></text>
<text x="22" y="245" xml:space="preserve"><tspan fill="#79c0ff">vectordb=# </tspan><tspan fill="#e6edf3">SELECT doc_id, file_name, file_order, is_main_pdf FROM attachments;</tspan></text>

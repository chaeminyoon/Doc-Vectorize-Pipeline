<text x="22" y="98" xml:space="preserve"><tspan fill="#e6edf3">--- [1] similarity=</tspan><tspan fill="#e3b341">0.5451</tspan><tspan fill="#e6edf3"> | mode=</tspan><tspan fill="#79c0ff">vector</tspan><tspan fill="#e6edf3"> ---</tspan></text>

<text x="22" y="182" xml:space="preserve"><tspan fill="#8b949e">  category:  </tspan><tspan fill="#e6edf3">공유수면 &gt; 협의 &gt; 준설</tspan></text>
<text x="22" y="203" xml:space="preserve"><tspan fill="#8b949e">  text:      </tspan><tspan fill="#e6edf3">가. 신청인 : 푸른항만공사  나. 위 치 : 해양시 푸른항 진입항로 일원 공유수면</tspan></text>
<text x="22" y="224" xml:space="preserve"><tspan fill="#8b949e">             </tspan><tspan fill="#e6edf3">다. 면 적 : 5,742㎡  라. 준설량 : 14,006㎥  마. 목 적 : 항로준설 및 준설토 처리...</tspan></text>
<text x="22" y="245" xml:space="preserve"><tspan fill="#e6edf3"></tspan></text>
<text x="22" y="266" xml:space="preserve"><tspan fill="#3fb950">$ </tspan><tspan fill="#e6edf3">python main.py search "한빛해양개발이 신청한 부잔교 설치 허가"</tspan></text>
<text x="22" y="287" xml:space="preserve"><tspan fill="#8b949e">INFO  </tspan><tspan fill="#8b949e">Hybrid search — keyword: </tspan><tspan fill="#f0883e">'한빛해양개발'</tspan><tspan fill="#8b949e">  (고유명사 자동 감지 → 벡터+키워드 전환)</tspan></text>

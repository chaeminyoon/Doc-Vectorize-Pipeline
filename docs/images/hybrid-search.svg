<text x="22" y="329" xml:space="preserve"><tspan fill="#e6edf3">--- [1] similarity=</tspan><tspan fill="#e3b341">0.7171</tspan><tspan fill="#e6edf3"> | mode=</tspan><tspan fill="#f0883e">hybrid (keyword='한빛해양개발')</tspan><tspan fill="#e6edf3"> ---</tspan></text>
<text x="22" y="350" xml:space="preserve"><tspan fill="#8b949e">  doc_id:    </tspan><tspan fill="#e6edf3">DCT2025DEMO0001</tspan></text>

services:
  db:
    image: ${DB_IMAGE:-pgvector/pgvector:pg16}
    container_name: odt-pipeline-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vectordb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vectordb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:-odt-pipeline:onprem}
    container_name: odt-pipeline-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.onprem
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./metadata:/app/metadata:ro
      - ./models:/models:ro
    command: ["stats"]
    profiles: ["manual"]

volumes:
  pgdata:

<text x="22" y="455" xml:space="preserve"><tspan fill="#8b949e">             </tspan><tspan fill="#d2a8ff">| ㈜한빛해양개발 | 해양시 푸른구 해돋이동 123-4번지선 공유수면 | 1,250㎡ |</tspan></text>
